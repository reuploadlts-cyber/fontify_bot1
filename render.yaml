services:
  - type: web
    name: fontify-bot
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: CHANNEL_USERNAME
        sync: false
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: 10000
      - key: APP_NAME
        value: FontifyBot
      - key: ENVIRONMENT
        value: production
